<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>拼Van - 离线模式</title>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #F5F5F5; }
    .box { text-align: center; padding: 40px; }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 24px; color: #1A1A1A; margin-bottom: 8px; }
    p { color: #616161; font-size: 14px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">📡</div>
    <h1>当前离线</h1>
    <p>请检查网络连接后重试</p>
    <p>拼Van 需要网络连接才能使用完整功能</p>
  </div>
</body>
</html>
